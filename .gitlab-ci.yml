---
include:
  # We include the default workflow for MR based pipelines (e.g build on default branch, tags and MR events)
  - template: 'Workflows/MergeRequest-Pipelines.gitlab-ci.yml'
  # Import pre-fabricated Docker pipeline based on kaniko
  - project: 'gitlabci/gitlabci-templates'
    file: '/jobs/Kaniko/Base.gitlab-ci.yml'

default:
  tags:
    - docker
    - kubernetes

variables:
  CONTAINER_REGISTRY: registry.synyx.cloud
  CONTAINER_REPOSITORY: admins/nagdash

# Build and push image before deployment
build-docker:
  stage: build
  extends: ['.kaniko']

deploy:
  stage: deploy
  environment:
    name: production
    url: https://nagdash.synyx.coffee
  before_script:
    - export KUBECONFIG=/tmp/config
    - kubectl config set-cluster synyx --server=https://k8s-master.synyx.coffee:6443 --certificate-authority=$CI_PROJECT_DIR/deploy/ca.crt
    - kubectl config set-credentials deployer --token="$K8S_DEPLOYER_TOKEN"
    - kubectl config set-context default --user=deployer --cluster=synyx --namespace=infra
    - kubectl config use-context default
  script:
    - kubectl version
    - kubectl set image deployment/nagdash nagdash=$CONTAINER_REGISTRY/$CONTAINER_REPOSITORY:$CI_COMMIT_TAG
  image: registry.synyx.cloud/docker.io/bitnami/kubectl:1.22
  rules:
    - if: $CI_COMMIT_TAG
    - when: never
