---

build:
  stage: build
  image:
    name: registry.synyx.cloud/gcr.io/kaniko-project/executor:debug
    entrypoint: [""]
  script:
    - mkdir -p /kaniko/.docker
    - echo "{\"auths\":{\"registry.synyx.cloud\":{\"auth\":\"$(printf "%s:%s" "${CONTAINER_REGISTRY_USERNAME}" "${CONTAINER_REGISTRY_PASSWORD}" | base64 | tr -d '\n')\"}}}" > /kaniko/.docker/config.json
    - >-
      /kaniko/executor
      --cache=true --reproducible
      --context "${CI_PROJECT_DIR}"
      --dockerfile "${CI_PROJECT_DIR}/Dockerfile"
      --destination "registry.synyx.cloud/infra/nagdash:${CONTAINER_BUILD_TAG}"
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      variables:
        CONTAINER_BUILD_TAG: latest
    - if: $CI_MERGE_REQUEST_IID
      variables:
        CONTAINER_BUILD_TAG: ${CI_COMMIT_REF_SLUG}
    - if: $CI_COMMIT_TAG
      variables:
        CONTAINER_BUILD_TAG: ${CI_COMMIT_REF_NAME}
